            border-radius: 8px;

            font-size: 18px;

            border-radius: 8px;

            border-radius: 0 8px 8px 0;
            text-align: left;

            font-size: 15px;

        }
        .error {
            color: #ff4444;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }

    function sprawdzKod() {
        const input = document.getElementById('keyCode').value.trim().toLowerCase();
        const errorMsg = document.getElementById('errorMsg');
        const resultCard = document.getElementById('resultCard');
        const taskTitle = document.getElementById('taskTitle');
        const taskContent = document.getElementById('taskContent');
        
        // Obliczamy hash MD5 wpisanego kodu
        const hashedInput = md5(input);
        
        if (bazaZadan[hashedInput]) {
            errorMsg.style.display = 'none';
            taskTitle.innerText = `KRYPTONIM AKTYWNY: ${bazaZadan[hashedInput].kod}`;
            taskContent.innerText = bazaZadan[hashedInput].tekst;
            resultCard.style.display = 'block';
        } else {
            resultCard.style.display = 'none';
            errorMsg.style.display = 'block';
        }
    }

    // Obsługa klawisza Enter
    document.getElementById('keyCode').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sprawdzKod();
        }
    });

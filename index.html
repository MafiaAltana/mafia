<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kryptonim: Mafia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <style>
        body {
            background-color: #0f0f12;
            color: #e0e0e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #16161a;
            border: 1px solid #24242b;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 {
            color: #ff3366;
            font-size: 26px;
            margin-top: 0;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #72727e;
            font-size: 14px;
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            background-color: #202024;
            border: 1px solid #33333b;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            box-sizing: border-box;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #ff3366;
            outline: none;
        }
        button {
            background-color: #ff3366;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #e02454;
        }
        button:active {
            transform: scale(0.98);
        }
        .card {
            margin-top: 25px;
            background-color: #1f1f24;
            border-left: 4px solid #ff3366;
            padding: 22px;
            border-radius: 0 8px 8px 0;
            text-align: left;
            display: none;
            animation: fadeIn 0.4s ease-in-out forwards;
        }
        .card h3 {
            margin: 0 0 12px 0;
            color: #ff3366;
            font-size: 16px;
            letter-spacing: 1px;
        }
        .card p {
            margin: 0;
            line-height: 1.6;
            color: #d1d1d6;
            font-size: 15px;
            white-space: pre-line;
        }
        .error {
            color: #ff4444;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>KRYPTONIM: MAFIA</h1>
    <div class="subtitle">Wprowadź swój unikalny kod z karty dostępu</div>
    
    <input type="text" id="keyCode" placeholder="Wpisz kod (np. MK2131)" autocomplete="off" autofocus>
    <button onclick="sprawdzKod()">Dekoduj akta</button>
    
    <div id="errorMsg" class="error">BŁĄD DEKODOWANIA: Niepoprawny kryptonim.</div>
    
    <div id="resultCard" class="card">
        <h3 id="taskTitle">STATUS: AKTYWNY</h3>
        <p id="taskContent"></p>
    </div>
</div>

<script>
    // Pełna, bezpieczna baza spięta z Twoim plikiem CSV (Klucze to hashe MD5 z małych liter kodu)
    const bazaZadan = {
        "7eb31876e93e24b423fa976722fcbfa7": {
            kod: "MK2131",
            tekst: "Walet Kier – „Kontrabanda”:\nZrób zdjęcie, na którym dyskretnie wsuwasz komuś do kieszeni lub do torebki papierosa/iqosa, tak aby ta osoba o tym nie wiedziała. (Zdjęcie musi zostać wykonane aparatem solenizantki)."
        },
        "9fa7a57dfb813134fb3f4e3895a09282": {
            kod: "KA9123",
            tekst: "As Pik – „Cień mafii”:\nZrób zdjęcie, na którym widać Twój wyraźny cień padający na plecy niczego nieświadomej Julii. Ona nie może Cię zauważyć w tym momencie. (Zdjęcie musi zostać wykonane aparatem solenizantki, Członek mafii w czerwonej koszuli jest zaznajomiony z tym zadaniem możesz poprosić go o wykonanie zdjęcia)."
        },
        "71328005391a84f3780a1387d3539fb0": {
            kod: "IK6812",
            tekst: "Dama Pik – „Dowód tożsamości”:\nZrób zdjęcie zrobione „z ukrycia” (np. zza wazonu, zza filaru) pokazujące profil dwóch rozmawiających osób, ciebie + solenizantki jakbyś prowadził z nią zbierania informacji."
        },
        "9c011e405bf998a4ff82ccbf6fe883a3": {
            kod: "KO0483",
            tekst: "10 Pik – „Czarny kocur”:\nSfotografuj osobę pijącą drinka w taki sposób, aby na zdjęciu – tuż obok jej szklanki – znalazł się czarny element ubioru innej osoby (np. rękaw, ramię)."
        },
        "c019076041695286b206cb927b233a05": {
            kod: "MB4351",
            tekst: "As Kier – „Czyste ręce”:\nPrzekaż komuś kieliszek lub drinka tak, aby na zdjęciu było widać tylko Wasze dłonie w momencie przekazywania, w surowym, mafijnym kadrze."
        },
        "9bf12a0f8bfdfcbca5e9db28b9d9978f": {
            kod: "SB9659",
            tekst: "Król Kier – „Przejęcie ładunku”:\nZrób zdjęcie, na którym „podkradasz” lód z drinka lub jedzenie z talerza innego gościa, podczas gdy on patrzy w inną stronę."
        },
        "084620f4f9f68853b0e1bba636bb24b3": {
            kod: "JK0751",
            tekst: "10 Kier – „Zasłona dymna”:\nSfotografuj stół z drinkami przez pryzmat unoszącego się dymu (np. z zimnych ogni, papierosa lub iqosa), tworząc tajemniczy klimat."
        },
        "3d115e47a2fb6ef3e3f6fc413008064d": {
            kod: "PB2086",
            tekst: "Król Karo – „Pakt milczenia”:\nUchwyć na zdjęciu moment, w którym „przybijasz żółwika” lub potajemnie podajesz rękę wybranej osobie pod stołem."
        },
        "0be9430c4974f1d431c9e89d6f03f7e6": {
            kod: "PS8108",
            tekst: "Dama Kier – „Krwawy podpis”:\nNamów kogoś, by zostawił ślad czerwonej szminki na serwetce (lub zrób to sam/a) i sfotografuj ją obok pełnego kieliszka."
        },
        "42b7bf7be8f2537f1cae4c0576356e71": {
            kod: "HB6409",
            tekst: "„Ochroniarz Dona”:\nStwórz kadr, na którym stoisz plecami do Julii w odległości około metra, z założonymi rękami i ciemnymi okularami, pilnując terenu."
        },
        "5b1b49f9976378fb5c6ae4fc624c9c61": {
            kod: "MB7432",
            tekst: "Walet Karo – „Złoty strzał”:\nSfotografuj moment, w którym co najmniej 3 osoby jednocześnie stukają się kieliszkami, ale ostrość zdjęcia musi być ustawiona na jeden, konkretny, pełny kieliszek na stole."
        },
        "0a349bc9842f1cf85fb12b041cf339fb": {
            kod: "NZ6666",
            tekst: "„Zabezpieczenie dowodów”:\nTwoim zadaniem jest sfotografowanie rzędu co najmniej 5 pustych kieliszków ułożonych w idealnej linii prostej na krawędzi stołu."
        },
        "3c306d6498ee3e08fbf79320da089bf8": {
            kod: "MZ9999",
            tekst: "10 Trefl – „Świadek koronny”:\nZrób zdjęcie osobie, która jako pierwsza z gości pójdzie zjeść coś ciepłego lub tort, uwieczniając moment pierwszego kęsa."
        },
        "a9ec2b102b3df3c51f496156e9fa2c65": {
            kod: "JK9042",
            tekst: "Walet Trefl – „Ostatnie sekundy”:\nSfotografuj tarczę zegarka (lub telefon z godziną) na tle twarzy osoby, która głośno się śmieje."
        },
        "1375d8cb9183416a9282d8c364177b96": {
            kod: "KS1286",
            tekst: "„Złoty strzał w ciemno”:\nWeź losowy śmieszny przedmiot i udawaj że odpalasz nim papierosa. Zrób zdjęcie z profilu, trzymając w ustach nieodpalonego papierosa (lub paluszek/słomkę). (Zdjęcie musi zostać wykonane aparatem solenizantki, Członek mafii w czerwonej koszuli jest zaznajomiony z tym zadaniem możesz poprosić go o wykonanie zdjęcia)."
        },
        "4993a40871309322055106e6bfda9f57": {
            kod: "GH6767",
            tekst: "„Przesłuchanie trzeciego stopnia”:\nZaaranżuj zdjęcie, na którym siedzisz przy stole naprzeciwko kogoś, świecąc mu w twarz latarką z telefonu, imitując policyjne przesłuchanie."
        },
        "61cb83bf1e6005704a2db65c0bb383e7": {
            kod: "MK3542",
            tekst: "„Krwawy diament”:\nSfotografuj kostkę lodu ze swojego drinka, którą trzymasz w palcach pod światło latarki z telefonu, tak aby wyglądała jak potężny, luksusowy diament z przemytu."
        },
        "4264629910d55e098beee3398c770c06": {
            kod: "MM5605",
            tekst: "10 Karo – „Szyfr”:\nUłoż z żetonów lub kart na stole tajemniczy symbol („J” jak Julia) i zrób zdjęcie z góry, uwieczniając cały stół."
        }
    };

    function sprawdzKod() {
        const input = document.getElementById('keyCode').value.trim().toLowerCase();
        const errorMsg = document.getElementById('errorMsg');
        const resultCard = document.getElementById('resultCard');
        const taskTitle = document.getElementById('taskTitle');
        const taskContent = document.getElementById('taskContent');
        
        // Obliczamy hash MD5 wpisanego kodu
        const hashedInput = md5(input);
        
        if (bazaZadan[hashedInput]) {
            errorMsg.style.display = 'none';
            taskTitle.innerText = `KRYPTONIM AKTYWNY: ${bazaZadan[hashedInput].kod}`;
            taskContent.innerText = bazaZadan[hashedInput].tekst;
            resultCard.style.display = 'block';
        } else {
            resultCard.style.display = 'none';
            errorMsg.style.display = 'block';
        }
    }

    // Umożliwiamy kliknięcie Enter w polu tekstowym w celu zatwierdzenia kodu
    document.getElementById('keyCode').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sprawdzKod();
        }
    });
</script>

</body>
</html>

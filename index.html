<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archiwum Mafii: Dowody Rzeczowe</title>
    <style>
        body {
            background-color: #0f0f12;
            color: #e0e0e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ff3366;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            color: #72727e;
            font-size: 14px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* Siatka kafelków */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        /* Kontener dla efektu 3D obracania */
        .card-container {
            background-color: transparent;
            height: 380px;
            perspective: 1000px; /* Wymagane do efektu 3D */
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        /* Klasa dodawana przez JavaScript po kliknięciu */
        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* Przód i Tył karty */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Ukrywa drugą stronę podczas obrotu */
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* PRZÓD KARTY (Zdjęcie i Kod) */
        .card-front {
            background-color: #16161a;
            border: 1px solid #24242b;
        }

        .card-image-wrapper {
            width: 100%;
            height: 80%;
            border-top-left-radius: 11px;
            border-top-right-radius: 11px;
            overflow: hidden;
            background-color: #202024;
            position: relative;
        }

        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ładnie docina zdjęcie do kadru */
        }

        .card-author-tag {
            height: 20%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1c1c22;
            color: #ff3366;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1px;
            border-bottom-left-radius: 11px;
            border-bottom-right-radius: 11px;
        }

        /* TYŁ KARTY (Treść zadania) */
        .card-back {
            background-color: #1f1f24;
            border: 1px solid #ff3366;
            transform: rotateY(180deg); /* Domyślnie odwrócona o 180 stopni */
            padding: 25px;
            justify-content: center;
            align-items: center;
        }

        .card-back h3 {
            margin: 0 0 15px 0;
            color: #ff3366;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-back p {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            color: #d1d1d6;
            white-space: pre-line;
        }

        /* Responsywność */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .card-container {
                height: 340px;
            }
        }
    </style>
</head>
<body>

    <h1>Archiwum Mafii: Dowody Rzeczowe</h1>
    <div class="subtitle">Kliknij na kartę, aby odwrócić i poznać szczegóły misji</div>

    <div class="grid" id="galleryGrid">
        </div>

<script>
    // Kompletna baza 21 zadań spięta z plikami graficznymi
    const listaZadan = [
        { kod: "MK2131", tekst: "Walet Kier – „Kontrabanda”:\nZrób zdjęcie, na którym dyskretnie wsuwasz komuś do kieszeni lub do torebki papierosa/iqosa..." },
        { kod: "KA9123", tekst: "As Pik – „Cień mafii”:\nZrób zdjęcie, na którym widać Twój wyraźny cień padający na plecy niczego nieświadomej Julii..." },
        { kod: "IK6812", tekst: "Dama Pik – „Dowód tożsamości”:\nZrób zdjęcie zrobione „z ukrycia” pokazujące profil dwóch rozmawiających osób, ciebie + solenizantki..." },
        { kod: "KO8437", tekst: "10 Pik – „Czarny kocur”:\nSfotografuj osobę pijącą drinka w taki sposób, aby na zdjęcia – tuż obok jej szklanki – leżał czarny/czerwony element..." },
        { kod: "MB4351", tekst: "As Kier – „Czyste ręce”:\nPrzekaż komuś kieliszek lub drinka tak, aby widać było tylko Wasze dłonie, ale Ty musisz mieć na sobie eleganckie rękawiczki..." },
        { kod: "SB9659", tekst: "Król Kier – „Przejęcie ładunku”:\nZrób zdjęcie, na którym „podkradasz” lód z drinka lub jedzenie z talerza innej osoby za pomocą szczypiec lub widelca..." },
        { kod: "JK0751", tekst: "10 Kier – „Zasłona dymna”:\nSfotografuj stół z drinkami przez pryzmat unoszącego się dymu, tworząc klimat jak z zadymionego baru z lat 20..." },
        { kod: "PB2086", tekst: "Król Karo – „Pakt milczenia”:\nUchwyć na zdjęciu moment, w którym „przybijasz żółwika” lub potajemnie podajesz rękę innej osobie pod stołem..." },
        { kod: "PS8108", tekst: "Dama Kier – „Krwawy podpis”:\nNamów kogoś, by zostawił ślad czerwonej szminki na serwetce, a następnie uchwyć na jednym zdjęciu serwetke oraz solenizantke..." },
        { kod: "HB6409", tekst: "Król Pik - „Ochroniarz Dona”:\nStwórz kadr, na którym stoisz plecami do Julii w odległości około metra, z założonymi rękami, pilnując terenu..." },
        { kod: "MB7432", tekst: "Walet Karo – „Złoty strzał”:\nSfotografuj moment, w którym co najmniej 3 osoby jednocześnie stukają się kieliszkami, uwieczniając spadającą w tle kość..." },
        { kod: "NZ6666", tekst: "„Zabezpieczanie dowodów”:\nZrób zdjęcie, na którym wkładasz do przezroczystego woreczka losowy przedmiot należący do innego gościa bez jego wiedzy..." },
        { kod: "MZ9999", tekst: "10 Trefl – „Świadek koronny”:\nZrób zdjęcie osobie, która jako pierwsza z gości pójdzie zjeść coś ciepłego lub weźmie kawałek tortu w momencie pierwszego kęsa..." },
        { kod: "JK9042", tekst: "Walet Trefl – „Ostatnie sekundy”:\nSfotografuj tarczę zegarka (lub telefon z godziną) na tle twarzy osoby, która w tym momencie głośno się śmieje..." },
        { kod: "KS1286", tekst: "Król Trefl - „Złoty strzał w ciemno”:\nWeź losowy śmieszny przedmiot i udawaj że odpalasz nim papierosa. Zrób zdjęcie z profilu trzymając przedmiot w ustach..." },
        { kod: "GH6767", tekst: "As Trefl - „Przesłuchanie trzeciego stopnia”:\nZaaranżuj zdjęcie, na którym siedzisz przy stole naprzeciwko kogoś, świecąc mu w twarz latarką, samemu pozostając w mroku..." },
        { kod: "MK3542", tekst: "Walet Pik – „Krwawy diament”:\nSfotografuj kostkę lodu ze swojego drinka trzymaną w palcach pod światło latarki, by wyglądała jak diament z przemytu..." },
        { kod: "MM5605", tekst: "10 Karo – „Szyfr”:\nUłóż z żetonów lub kart na stole tajemniczy symbol („J” jak Julia) i zrób zdjęcie z góry tak, by w tle było widać ludzi..." },
        { kod: "JP5976", tekst: "As Karo – „Zabójcze spojrzenie”:\nZrób zdjęcie grupowe, na którym wszyscy się śmieją, a Ty jako jedyny/a patrzysz prosto w obiektyw bez uśmiechu..." },
        { kod: "JZ0000", tekst: "Dama Karo – „Wypatrywanie celu”:\nZrób zdjęcie, na którym stoisz tyłem do obiektywu, patrząc przez okno altanki na zewnątrz z kieliszkiem w ręku..." },
        { kod: "GŚ6969", tekst: "Dama Trefl – „Otrucie”:\nZrób zdjęcie, na którym trzymasz dłoń nad szklanką innej osoby, jakbyś wrzucał/a tam „tajną pigułkę” (np. borówkę)..." }
    ];

    const grid = document.getElementById('galleryGrid');

    // Dynamicznie renderujemy karty
    listaZadan.forEach(zadanie => {
        const container = document.createElement('div');
        container.className = 'card-container';
        
        // Funkcja obracania karty po kliknięciu
        container.onclick = function() {
            this.classList.toggle('flipped');
        };

        // Zmiana kodu na małe litery na potrzeby pasującej nazwy pliku graficznego
        const imgName = zadanie.kod.toLowerCase().replace('ś', 's');

        container.innerHTML = `
            <div class="card-inner">
                <div class="card-front">
                    <div class="card-image-wrapper">
                        <img src="img/${imgName}.jpg" alt="Dowód ${zadanie.kod}" onerror="this.onerror=null; this.src='https://via.placeholder.com/300x250/202024/ff3366?text=Brak+zdj%C4%99cia';">
                    </div>
                    <div class="card-author-tag">AGENT: ${zadanie.kod}</div>
                </div>
                <div class="card-back">
                    <h3>KRYPTONIM: ${zadanie.kod}</h3>
                    <p>${zadanie.tekst}</p>
                </div>
            </div>
        `;
        
        grid.appendChild(container);
    });
</script>

</body>
</html>
